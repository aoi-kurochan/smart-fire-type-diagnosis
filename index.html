    :root {
      --ink: #243044;
      --muted: #667085;
      --soft-navy: #44566f;
      --paper: #fffdf8;
      --base: #f7f0e7;
      --cream: #fff9ef;
      --line: #e8dccf;
      --rose: #d8a8aa;
      --rose-deep: #a45f69;
      --bar-a: #7890a8;
      --bar-b: #d8a8aa;
      --bar-c: #b9a47a;
      --bar-d: #8a9a91;
      --shadow: 0 18px 50px rgba(68, 86, 111, 0.12);
      --radius: 8px;
      --body-font: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", sans-serif;
      --heading-font: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(216, 168, 170, 0.18), transparent 28rem),
        linear-gradient(180deg, var(--paper) 0%, var(--base) 100%);
      font-family: var(--body-font);
      line-height: 1.9;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 22px 18px 36px;
    }

    .site-header {
      padding: 10px 0 18px;
      color: var(--soft-navy);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .hero {
      padding: 24px 0 28px;
    }

    .hero-mark {
      width: 100%;
      height: 86px;
      margin-bottom: 18px;
      border: 1px solid rgba(232, 220, 207, 0.9);
      border-radius: var(--radius);
      background: rgba(255, 253, 248, 0.78);
      box-shadow: 0 10px 28px rgba(68, 86, 111, 0.08);
      overflow: hidden;
    }

    .hero h1 {
      margin: 0;
      font-family: var(--heading-font);
      font-size: clamp(1.22rem, 5.55vw, 2.95rem);
      line-height: 1.38;
      font-weight: 600;
      color: #202b3c;
    }

    .hero-title-line {
      display: block;
      white-space: nowrap;
    }

    .nowrap {
      white-space: nowrap;
    }

    .lead {
      margin: 22px 0 0;
      color: #445066;
      font-size: 1rem;
    }

    .lead p {
      margin: 0 0 14px;
    }

    .section-title {
      margin: 0 0 16px;
      font-family: var(--heading-font);
      font-size: 1.42rem;
      line-height: 1.5;
      font-weight: 600;
    }

    .diagnosis {
      margin-top: 12px;
    }

    .question {
      margin: 0 0 22px;
      padding: 22px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 248, 0.86);
      box-shadow: 0 10px 28px rgba(68, 86, 111, 0.06);
    }

    .question legend {
      padding: 0;
      margin-bottom: 15px;
      font-weight: 700;
      line-height: 1.7;
    }

    .option-list {
      display: grid;
      gap: 10px;
    }

    .option {
      position: relative;
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      padding: 14px 13px;
      border: 1px solid #eadfd3;
      border-radius: var(--radius);
      background: #fffaf2;
      color: #354158;
      transition: border-color 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      border-color: rgba(164, 95, 105, 0.45);
      background: #fffdf8;
    }

    .option input {
      width: 18px;
      height: 18px;
      margin: 4px 0 0;
      accent-color: var(--rose-deep);
    }

    .option:has(input:focus-visible) {
      outline: 3px solid rgba(164, 95, 105, 0.26);
      outline-offset: 2px;
    }

    .option:has(input:checked) {
      border-color: rgba(164, 95, 105, 0.72);
      background: #fff6f2;
      box-shadow: inset 4px 0 0 rgba(164, 95, 105, 0.44);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin: 28px 0 18px;
    }

    .primary-button,
    .secondary-button {
      min-height: 52px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      padding: 13px 18px;
      font-weight: 700;
      line-height: 1.4;
    }

    .primary-button {
      color: #fffdf8;
      background: var(--soft-navy);
      box-shadow: 0 14px 28px rgba(68, 86, 111, 0.18);
    }

    .primary-button:hover {
      background: #34465d;
    }

    .secondary-button {
      color: var(--soft-navy);
      background: #fffaf2;
      border-color: var(--line);
    }

    .secondary-button:hover {
      border-color: rgba(68, 86, 111, 0.34);
      background: #fffdf8;
    }

    .notice {
      min-height: 28px;
      margin: 0;
      color: var(--rose-deep);
      font-weight: 700;
    }

    .result {
      display: none;
      margin: 34px 0 28px;
    }

    .result.is-visible {
      display: block;
      animation: fadeIn 0.3s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-card {
      padding: 28px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 248, 0.96);
      box-shadow: var(--shadow);
    }

    .result-kicker {
      margin: 0 0 8px;
      color: var(--rose-deep);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .result-title {
      margin: 0 0 16px;
      font-family: var(--heading-font);
      font-size: clamp(1.75rem, 7vw, 2.45rem);
      line-height: 1.42;
      font-weight: 600;
    }

    .result-intro {
      margin: 0 0 22px;
      color: #445066;
    }

    .subtype {
      margin: 20px 0;
      padding: 16px 15px;
      border: 1px solid #eadfd3;
      border-radius: var(--radius);
      background: #fff8f2;
    }

    .subtype p {
      margin: 0 0 8px;
    }

    .subtype p:last-child {
      margin-bottom: 0;
    }

    .subtype-title {
      color: var(--soft-navy);
      font-weight: 700;
    }

    .bars {
      margin: 24px 0 26px;
      padding: 18px 0 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(118px, 42%) 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .bar-label {
      color: #39465d;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .bar-track {
      height: 14px;
      border-radius: 999px;
      background: #f0e7dc;
      overflow: hidden;
    }

    .bar-fill {
      display: block;
      height: 100%;
      min-width: 7%;
      border-radius: inherit;
      transition: width 0.3s ease;
    }

    .bar-fill.type-a {
      background: var(--bar-a);
    }

    .bar-fill.type-b {
      background: var(--bar-b);
    }

    .bar-fill.type-c {
      background: var(--bar-c);
    }

    .bar-fill.type-d {
      background: var(--bar-d);
    }

    .result-section {
      margin: 24px 0 0;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .result-section h3 {
      margin: 0 0 8px;
      color: #2f3c54;
      font-family: var(--heading-font);
      font-size: 1.08rem;
      line-height: 1.55;
      font-weight: 600;
    }

    .result-section p {
      margin: 0 0 10px;
      color: #445066;
    }

    .result-section p:last-child {
      margin-bottom: 0;
    }

    .after-message {
      margin: 32px 0 0;
      padding: 22px 18px;
      border-left: 4px solid rgba(164, 95, 105, 0.42);
      background: #fff8f2;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .after-message p {
      margin: 0 0 10px;
    }

    .after-message p:last-child {
      margin-bottom: 0;
    }

    .site-footer {
      padding: 20px 0 8px;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 640px) {
      .page {
        padding: 30px 28px 44px;
      }

      .hero {
        padding-top: 34px;
      }

      .hero-mark {
        height: 104px;
      }

      .question {
        padding: 26px 24px;
      }

      .result-card {
        padding: 36px 34px;
      }

      .actions {
        grid-template-columns: 1fr auto;
        align-items: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

          "焦って増やすより、まずは現状を見える化しましょう。"
        ],
        today: ["今月の固定費、変動費、貯蓄額をざっくり書き出してみましょう。"],
        week: [
          "使っていないサブスク、見直せる固定費、減らせる支出を3つ探してみましょう。",
          "小さな改善でも、毎月続けば大きな余裕になります。"
        ],
        month: [
          "毎月の余剰資金を把握し、無理なく続けられる資産運用や貯蓄の方針を決めましょう。",
          "投資は、生活を壊さない範囲で進めることが大切です。"
        ],
        material: ["高スワップ通貨の比較リスト5選"]
      },
      D: {
        intro: [
          "あなたは、いきなり副業や投資に走る前に、心と時間の余白を作ることが先かもしれません。",
          "会社のストレスで消耗しきっている状態では、よい判断がしにくくなります。",
          "まずは、働き方、休み方、会社との距離感を少しずつ整えていきましょう。"
        ],
        state: [
          "今のあなたは、副業や投資を増やす前に、心と時間の余白を取り戻すことが先かもしれません。",
          "会社のストレスで消耗しきっている状態では、よい判断がしにくくなります。"
        ],
        stumble: [
          "焦って副業を増やし、仕事の疲れにさらに作業を重ねてしまうことです。",
          "副業が逃げ道ではなく、もう一つの負担になると続きません。"
        ],
        today: ["今の仕事で「減らせる負担」「断れること」「相談できること」を3つ書き出してみましょう。"],
        week: [
          "残業、休日対応、苦手な人間関係、断れない仕事の中から、1つだけ距離を置く工夫を考えてみましょう。"
        ],
        month: [
          "仕事の負担を少し減らしながら、週に1回だけスマートFIREの準備時間を作ってみましょう。",
          "まずは壊れない働き方を作ることが大切です。"
        ],
        material: ["0から10万円を目指す収入づくりの方法"]
      }
    };

    const afterMessage = [
      "診断結果は、最初の一歩を整理するための目安です。",
      "スマートFIREは、焦って会社を辞めるためのものではありません。",
      "会社員の安定を活かしながら、少しずつ選択肢を増やしていくための考え方です。",
      "今日の小さな一歩から始めていきましょう。"
    ];

    const form = document.querySelector("#diagnosis-form");
    const questionsRoot = document.querySelector("#questions");
    const notice = document.querySelector("#notice");
    const result = document.querySelector("#result");
    const resultTitle = document.querySelector("#result-title");
    const resultIntro = document.querySelector("#result-intro");
    const subtype = document.querySelector("#subtype");
    const bars = document.querySelector("#bars");
    const resultDetails = document.querySelector("#result-details");
    const afterMessageRoot = document.querySelector("#after-message");
    const resetButton = document.querySelector("#reset-button");

    function createParagraphs(lines) {
      return lines.map((line) => `<p>${line}</p>`).join("");
    }

    function renderQuestions() {
      questionsRoot.innerHTML = questions.map((question, questionIndex) => {
        const name = `question-${questionIndex}`;
        const options = Object.entries(question.options).map(([type, label]) => {
          const id = `${name}-${type}`;
          return `
            <label class="option" for="${id}">
              <input id="${id}" type="radio" name="${name}" value="${type}">
              <span>${label}</span>
            </label>
          `;
        }).join("");

        return `
          <fieldset class="question">
            <legend>${question.text}</legend>
            <div class="option-list">${options}</div>
          </fieldset>
        `;
      }).join("");
    }

    function getScores() {
      const scores = { A: 0, B: 0, C: 0, D: 0 };
      const formData = new FormData(form);

      for (let index = 0; index < questions.length; index += 1) {
        const answer = formData.get(`question-${index}`);

        if (!answer) {
          return null;
        }

        scores[answer] += 1;
      }

      return scores;
    }

    function rankTypes(scores) {
      return Object.keys(scores).sort((left, right) => {
        if (scores[right] !== scores[left]) {
          return scores[right] - scores[left];
        }

        return typeOrder.indexOf(left) - typeOrder.indexOf(right);
      });
    }

    function renderBars(scores) {
      const maxScore = Math.max(...Object.values(scores), 1);
      bars.innerHTML = ["A", "B", "C", "D"].map((type) => {
        const width = Math.max((scores[type] / maxScore) * 100, 7);
        return `
          <div class="bar-row">
            <div class="bar-label">${typeLabels[type]}</div>
            <div class="bar-track" aria-label="${typeLabels[type]}の傾向">
              <span class="bar-fill type-${type.toLowerCase()}" style="width: ${width}%"></span>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderResult(scores) {
      const rankedTypes = rankTypes(scores);
      const mainType = rankedTypes[0];
      const subType = rankedTypes[1];
      const detail = results[mainType];

      resultTitle.textContent = typeLabels[mainType];
      resultIntro.innerHTML = createParagraphs(detail.intro);
      subtype.innerHTML = `
        <p class="subtype-title">サブ傾向：${typeLabels[subType]}の傾向もあります</p>
        ${createParagraphs(subtypeComments[subType])}
      `;

      renderBars(scores);

      resultDetails.innerHTML = `
        <section class="result-section">
          <h3>今のあなたの状態</h3>
          ${createParagraphs(detail.state)}
        </section>
        <section class="result-section">
          <h3>このタイプがつまずきやすいこと</h3>
          ${createParagraphs(detail.stumble)}
        </section>
        <section class="result-section">
          <h3>今日やる小さな一歩</h3>
          ${createParagraphs(detail.today)}
        </section>
        <section class="result-section">
          <h3>7日以内にやること</h3>
          ${createParagraphs(detail.week)}
        </section>
        <section class="result-section">
          <h3>1ヶ月の目安</h3>
          ${createParagraphs(detail.month)}
        </section>
        <section class="result-section">
          <h3>相性がよさそうな特典</h3>
          <p>これから順番に届く特典の中では、「${detail.material[0]}」がこのタイプと特に相性がよさそうです。</p>
        </section>
      `;
      afterMessageRoot.innerHTML = createParagraphs(afterMessage);
      result.classList.add("is-visible");
      result.focus({ preventScroll: true });
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const scores = getScores();

      if (!scores) {
        notice.textContent = "すべての質問に回答してください";
        result.classList.remove("is-visible");
        return;
      }

      notice.textContent = "";
      renderResult(scores);
    });

    resetButton.addEventListener("click", () => {
      form.reset();
      notice.textContent = "";
      result.classList.remove("is-visible");
      form.scrollIntoView({ behavior: "smooth", block: "start" });
      const firstInput = form.querySelector("input");
      if (firstInput) {
        firstInput.focus({ preventScroll: true });
      }
    });

    renderQuestions();
  </script>
</body>
</html>
